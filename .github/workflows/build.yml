name: Build APK

on: [push, workflow_dispatch]

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool libltdl-dev pkg-config \
            zlib1g-dev libncurses-dev libffi-dev libssl-dev \
            cmake automake build-essential ccache

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3.0" virtualenv
          pip install buildozer

      - name: Cache Buildozer directories
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: emma-apk
          path: bin/*.apk
